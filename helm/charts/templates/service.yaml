apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.workloadName }}-service
  labels:
    {{- include "portfolio-website-react-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: {{ .Values.service.protocol }}
  selector:
    {{- include "portfolio-website-react-chart.selectorLabels" . | nindent 4 }}
